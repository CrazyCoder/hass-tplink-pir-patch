name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # continue-on-error: hassfest's [DEPENDENCIES] rule wants tplink declared
      # in after_dependencies, but doing so makes HA wait for tplink's full
      # setup before running our async_setup — which lands our description-map
      # mutations too late. See ha/kasa-pir.md caveats. We still want the other
      # ~24 hassfest checks to run (manifest validity, sorted keys, etc.), so
      # keep the step running but don't fail the workflow on its exit code.
      - uses: home-assistant/actions/hassfest@master
        continue-on-error: true

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
